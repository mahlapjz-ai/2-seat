<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>登录 - 座位图片管理</title>
<link rel="icon" type="image/png" sizes="192x192" href="seat-icon-192.png">
<link rel="stylesheet" href="login.css">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
/* 强制扫码容器全屏，不留黑边 */
#qrScannerContainer {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  background: #000 !important;
  z-index: 99999 !important;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
/* 让库的最外层元素填满屏幕 */
#qrReader {
  width: 100% !important;
  height: 100% !important;
  position: relative !important;
}
/* [关键] 强制视频画面裁剪填充，消除黑边和变形 */
#qrReader video {
  width: 100% !important;
  height: 100% !important;
  object-fit: cover !important;
  position: absolute;
  top: 0;
  left: 0;
}
/* [关键] 强制扫描遮罩层全屏居中，修复竖长方形问题 */
#qr-shaded-region {
  position: absolute !important;
  top: 0 !important;
  left: 0 !important;
  width: 100% !important;
  height: 100% !important;
  display: flex;
  align-items: center;
  justify-content: center;
}
/* 确保取消按钮在最上层，且不占用视频空间（悬浮） */
#btnCloseScanner {
  position: fixed !important;
  bottom: 30px !important;
  left: 50% !important;
  transform: translateX(-50%) !important;
  padding: 12px 30px !important;
  background: rgba(0,0,0,0.6) !important;
  color: #fff !important;
  border: 1px solid rgba(255,255,255,0.4) !important;
  border-radius: 8px !important;
  font-size: 16px !important;
  z-index: 100000 !important;
}
</style>
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">
    <!-- LOGO 占位区 -->
    <div class="login-logo">
      <img src="seat-icon-192.png" alt="图书馆座位管理系统" style="width:80px;height:80px;margin:0 auto 14px;display:block;border-radius:16px;">
      <div class="login-title">座位图片管理</div>
      <div class="login-subtitle">座位巡检协同系统</div>
    </div>

    <!-- 标签切换 -->
    <div class="login-tabs">
      <div class="login-tab active" data-tab="card">证号登录</div>
      <div class="login-tab" data-tab="collab">协作登录</div>
    </div>

    <!-- 证号登录 -->
    <div class="login-form active" id="form-card">
      <div id="card-login">
        <div class="form-group has-validation">
          <label class="form-label">读者证号</label>
          <div class="input-wrap">
            <input class="form-input" type="text" id="card-number" placeholder="请输入13-18位大写字母或数字" autocomplete="username">
            <span class="status-icon" id="cardNumIcon"></span>
          </div>
          <small class="hint" id="cardNumHint"></small>
        </div>
        <div class="form-group has-validation">
          <label class="form-label">密码</label>
          <div class="input-wrap">
            <input class="form-input" type="password" id="card-password" placeholder="请输入密码" autocomplete="current-password">
            <span class="status-icon" id="cardPwdIcon"></span>
          </div>
          <small class="hint" id="cardPwdHint"></small>
        </div>
        <button class="login-btn" id="btn-card-login">登录</button>
        <div class="login-error err" id="card-login-error"></div>
        <div class="login-switch">还没有账号？<a id="switch-to-register" disabled style="opacity:.5;pointer-events:auto;">注册</a></div>
      </div>
      <div id="card-register" style="display:none">
        <div class="form-group has-validation">
          <label class="form-label">姓名</label>
          <div class="input-wrap">
            <input class="form-input" type="text" id="reg-name" placeholder="请输入2-8个字符的姓名" autocomplete="name">
            <span class="status-icon" id="regNameIcon"></span>
          </div>
          <small class="hint" id="regNameHint"></small>
        </div>
        <div class="form-group has-validation">
          <label class="form-label">读者证号</label>
          <div class="input-wrap">
            <input class="form-input" type="text" id="reg-card" placeholder="请输入13-18位大写字母或数字" autocomplete="off">
            <span class="status-icon" id="regCardIcon"></span>
          </div>
          <small class="hint" id="regCardHint"></small>
        </div>
        <div class="form-group has-validation">
          <label class="form-label">密码</label>
          <div class="input-wrap">
            <input class="form-input" type="password" id="reg-password" placeholder="请输入至少6位密码" autocomplete="new-password">
            <span class="status-icon" id="regPwdIcon"></span>
          </div>
          <small class="hint" id="regPwdHint"></small>
        </div>
        <div class="form-group has-validation">
          <label class="form-label">确认密码</label>
          <div class="input-wrap">
            <input class="form-input" type="password" id="reg-password-confirm" placeholder="请再次输入密码" autocomplete="new-password">
            <span class="status-icon" id="regPwd2Icon"></span>
          </div>
          <small class="hint" id="regPwd2Hint"></small>
        </div>
        <button class="login-btn" id="btn-card-register">注册</button>
        <div class="login-error err" id="card-register-error"></div>
        <div class="login-switch">已有账号？<a id="switch-to-login">登录</a></div>
      </div>
    </div>

    <!-- 协作登录 -->
    <div class="login-form" id="form-collab">
      <div id="collab-step1">
        <div class="form-group has-validation">
          <label class="form-label">姓名</label>
          <div class="input-wrap">
            <input class="form-input" type="text" id="collab-name" placeholder="请输入2-8个字符的姓名">
            <span class="status-icon" id="collabNameIcon"></span>
          </div>
          <small class="hint" id="collabNameHint"></small>
        </div>
        <div class="form-group has-validation">
          <label class="form-label">手机号</label>
          <div class="input-wrap">
            <input class="form-input" type="tel" id="collab-phone" placeholder="请输入11位手机号" inputmode="numeric">
            <span class="status-icon" id="collabPhoneIcon"></span>
          </div>
          <small class="hint" id="collabPhoneHint"></small>
        </div>
        <button class="login-btn" id="btn-collab-relogin">快捷登录</button>
        <div class="login-divider">或</div>
        <button class="login-btn green" id="btn-collab-scan">扫描协作二维码</button>
        <div class="login-error err" id="collab-error"></div>
      </div>
    </div>
  </div>

  <!-- 页脚备案号占位 -->
  <div class="login-footer">
    座位图片管理 共享版 v2<br>
    <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener">粤ICP备XXXXXXXX号</a>
  </div>
</div>

<!-- 扫码全屏容器（样式由 <head> 中 <style> 控制） -->
<div id="qrScannerContainer" style="display:none;">
  <div id="qrReader"></div>
  <button id="btnCloseScanner">取消</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js" onerror="window.__sbLoadFailed=true"></script>
<script src="auth.js"></script>
<script>
(async function(){
  const $=id=>document.getElementById(id);

  // 轻提示
  function showToast(msg) {
    const t = document.createElement('div');
    t.textContent = msg;
    t.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(29,33,41,.82);color:#fff;padding:12px 24px;border-radius:10px;z-index:9999;font-size:15px;text-align:center;backdrop-filter:blur(4px);';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2000);
  }

  // Supabase SDK 加载检查
  if(window.__sbLoadFailed || (typeof window.supabase==='undefined' && typeof createClient==='undefined')){
    showToast('网络连接异常，请检查网络后刷新页面');
    return;
  }
  if(typeof isSupabaseReady==='function'&&!isSupabaseReady()){
    showToast('网络连接异常，请检查网络后刷新页面');
    return;
  }

  const tabs=document.querySelectorAll('.login-tab');
  const forms=document.querySelectorAll('.login-form');

  // 并行请求：session + 协作自动登录 + 注册开关
  const regLink = $('switch-to-register');
  const [sessionResult, collabResult, regSetting] = await Promise.all([
    getSession().catch(() => null),
    (async () => { const p = localStorage.getItem('assistant_phone'); if (!p) return null; try { return await assistantReLogin('', p); } catch(e) { return null; } })(),
    (async () => { try { const { data, error } = await getSupabaseClient().from('settings').select('value').eq('key', 'registration_enabled').single(); if (error) return null; return data; } catch(e) { return null; } })()
  ]);

  // 已登录则跳转
  if (sessionResult) { location.href = 'index.html'; return; }
  if (collabResult && collabResult.success) { location.href = 'index.html'; return; }
  if (collabResult === null) { /* 无协作缓存 */ }
  else { localStorage.removeItem('assistant_uid'); localStorage.removeItem('assistant_phone'); }

  // ========== 注册按钮状态 ==========
  let registrationEnabled = false;

  async function updateRegisterButton() {
    try {
      if (typeof getSupabaseClient === 'undefined' || !getSupabaseClient()) return;
      const { data, error } = await getSupabaseClient().from('settings').select('value').eq('key', 'registration_enabled').single();
      if (error) throw error;
      registrationEnabled = data?.value === 'true';
      _regFailCount = 0;
    } catch(e) {
      _regFailCount++;
      if (_regFailCount >= 3) { clearInterval(_regIntervalId); }
    }
    if (registrationEnabled) {
      regLink.disabled = false;
      regLink.style.opacity = '1';
      regLink.style.cursor = 'pointer';
    } else {
      regLink.disabled = true;
      regLink.style.opacity = '.5';
      regLink.style.cursor = 'not-allowed';
    }
  }

  if (regSetting && regSetting.value !== undefined) registrationEnabled = regSetting.value === 'true';
  updateRegisterButton();
  let _regFailCount = 0;
  const _regIntervalId = setInterval(updateRegisterButton, 30000);

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') updateRegisterButton();
  });

  regLink.addEventListener('click', (e) => {
    e.preventDefault();
    if (registrationEnabled) {
      $('card-login').style.display = 'none';
      $('card-register').style.display = 'block';
      hide('card-login-error');
    } else {
      showToast('注册暂未开放，请联系管理员');
    }
  });

  tabs.forEach(t=>t.onclick=()=>{
    tabs.forEach(x=>x.classList.remove('active'));forms.forEach(x=>x.classList.remove('active'));
    t.classList.add('active');$('form-'+t.dataset.tab).classList.add('active');
  });

  $('switch-to-login').onclick=()=>{$('card-register').style.display='none';$('card-login').style.display='block';hide('card-register-error');};
  function show(id,msg,type='err'){$(id).textContent=msg;$(id).className='login-error show '+type;}
  function hide(id){$(id).className='login-error err';}
  function loading(btn,on,text){
    if(on){
      btn.classList.add('loading');
      btn.disabled=true;
      btn._origText=btn.textContent;
      btn.setAttribute('data-loading-text',text||'正在验证...');
    }else{
      btn.classList.remove('loading');
      btn.disabled=false;
      if(btn._origText)btn.textContent=btn._origText;
    }
  }

  // 证号登录
  $('btn-card-login').onclick=async()=>{
    // 【v2.7.14】提交前强制全量校验，显示所有错误提示
    validateCardNum();
    validateCardPwd();
    if (!cardValidState.num || !cardValidState.pwd) {
      show('card-login-error', '请检查输入项');
      return;
    }
    const c=$('card-number').value.trim(),p=$('card-password').value;
    const btn=$('btn-card-login');loading(btn,true);hide('card-login-error');
    try{const r=await signInWithCard(c,p);loading(btn,false);
      if(r.success)location.href='index.html';
      else show('card-login-error',r.error||'登录失败');
    }catch(e){loading(btn,false);show('card-login-error','登录出错');}
  };

  // 注册
  $('btn-card-register').onclick=async()=>{
    if(!registrationEnabled){show('card-register-error','注册功能未开放，请联系管理员');return;}
    // 【v2.7.14】提交前强制全量校验，显示所有错误提示
    validateRegName();
    validateRegCard();
    validateRegPwd();
    validateRegPwd2();
    if (!regValidState.name || !regValidState.card || !regValidState.pwd || !regValidState.pwd2) {
      show('card-register-error', '请检查输入项');
      return;
    }
    const n=$('reg-name').value.trim(),c=$('reg-card').value.trim(),p=$('reg-password').value,p2=$('reg-password-confirm').value;
    const btn=$('btn-card-register');loading(btn,true);hide('card-register-error');
    try{const r=await signUpWithCard(c,p,n);loading(btn,false);
      if(r.success){
        if(r.needsEmailConfirm)show('card-register-error','注册成功！请直接登录','info');
        else location.href='index.html';
      }else{let m=r.error||'注册失败';if(m.includes('already'))m='该证号已注册，请直接登录';show('card-register-error',m);}
    }catch(e){loading(btn,false);show('card-register-error','注册出错');}
  };

  // 注册姓名实时过滤：仅允许中文、英文、数字
  $('reg-name').addEventListener('input', function() {
    this.value = this.value.replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, '');
  });

  // 【v2.7.1】注册表单实时校验
  const regValidState = { name: false, card: false, pwd: false, pwd2: false };

  function updateFieldStatus(inputEl, iconEl, hintEl, isValid, errMsg) {
    const val = inputEl.value;
    const hasInput = val.length > 0;
    // 图标
    iconEl.className = 'status-icon' + (hasInput ? (' show ' + (isValid ? 'valid' : 'invalid')) : '');
    iconEl.textContent = hasInput ? (isValid ? '✓' : '✗') : '';
    // 下方提示：仅不合法时显示红色错误，合法或为空时不显示
    if (hasInput && !isValid) {
      hintEl.className = 'hint error';
      hintEl.textContent = errMsg;
    } else {
      hintEl.className = 'hint';
      hintEl.textContent = '';
    }
    // 输入框边框
    inputEl.classList.remove('is-valid', 'is-invalid');
    if (hasInput) inputEl.classList.add(isValid ? 'is-valid' : 'is-invalid');
  }

  // 【v2.7.14】强制显示指定容器内所有未通过校验的输入框错误提示
  // 通过 dispatch blur 事件触发已有的 validate* 校验函数，使红色错误文字与边框显示出来
  function showAllHints(container) {
    const root = container || document;
    root.querySelectorAll('input').forEach(input => {
      input.dispatchEvent(new Event('blur'));
    });
  }

  function checkRegBtn() {
    // 【v2.7.14】按钮不再置灰，提交时强制校验
  }

  function validateRegName() {
    const val = $('reg-name').value.trim();
    const valid = /^[\u4e00-\u9fa5a-zA-Z0-9]{2,8}$/.test(val);
    regValidState.name = valid;
    updateFieldStatus($('reg-name'), $('regNameIcon'), $('regNameHint'), valid, '请输入2-8个字符，仅限中英文和数字');
    checkRegBtn();
    if (val) hide('card-register-error');
  }

  function validateRegCard() {
    const val = $('reg-card').value.trim();
    const valid = /^[A-Z0-9]{13,18}$/.test(val);
    regValidState.card = valid;
    updateFieldStatus($('reg-card'), $('regCardIcon'), $('regCardHint'), valid, '请输入13-18位大写字母或数字');
    checkRegBtn();
    if (val) hide('card-register-error');
  }

  function validateRegPwd() {
    const val = $('reg-password').value;
    const valid = val.length >= 6;
    regValidState.pwd = valid;
    updateFieldStatus($('reg-password'), $('regPwdIcon'), $('regPwdHint'), valid, '密码至少6位');
    // 同步校验确认密码
    if ($('reg-password-confirm').value) {
      const p2 = $('reg-password-confirm').value;
      const p2Valid = p2 === val;
      regValidState.pwd2 = p2Valid;
      updateFieldStatus($('reg-password-confirm'), $('regPwd2Icon'), $('regPwd2Hint'), p2Valid, '两次密码不一致');
    }
    checkRegBtn();
    if (val) hide('card-register-error');
  }

  function validateRegPwd2() {
    const val = $('reg-password-confirm').value;
    const valid = val.length > 0 && val === $('reg-password').value;
    regValidState.pwd2 = valid;
    updateFieldStatus($('reg-password-confirm'), $('regPwd2Icon'), $('regPwd2Hint'), valid, '两次密码不一致');
    checkRegBtn();
    if (val) hide('card-register-error');
  }

  $('reg-name').addEventListener('input', validateRegName);
  $('reg-name').addEventListener('blur', validateRegName);
  $('reg-card').addEventListener('input', validateRegCard);
  $('reg-card').addEventListener('blur', validateRegCard);
  $('reg-password').addEventListener('input', validateRegPwd);
  $('reg-password').addEventListener('blur', validateRegPwd);
  $('reg-password-confirm').addEventListener('input', validateRegPwd2);
  $('reg-password-confirm').addEventListener('blur', validateRegPwd2);

  // 协作快捷登录
  $('btn-collab-relogin').onclick=async()=>{
    // 【v2.7.14】提交前强制全量校验，显示所有错误提示
    validateCollabName();
    validateCollabPhone();
    if (!collabValidState.name || !collabValidState.phone) {
      show('collab-error', '请检查输入项');
      return;
    }
    const n=$('collab-name').value.trim(),ph=$('collab-phone').value.trim();
    const btn=$('btn-collab-relogin');loading(btn,true);hide('collab-error');
    try{const r=await assistantReLogin(n,ph);loading(btn,false);
      if(r.success)location.href='index.html';
      else show('collab-error',r.error||'登录失败，请先扫码绑定');
    }catch(e){loading(btn,false);show('collab-error','登录出错');}
  };

  // 扫码按钮：校验姓名+手机号后启动扫码
  $('btn-collab-scan').onclick = async () => {
    const n = $('collab-name').value.trim(), ph = $('collab-phone').value.trim();
    if (!n) { show('collab-error', '请先输入姓名'); return; }
    if (!ph || !/^1\d{10}$/.test(ph)) { show('collab-error', '请先输入正确的手机号'); return; }
    startQrScanner();
  };

  // 【v2.7.1】证号登录实时校验
  const cardValidState = { num: false, pwd: false };

  function checkCardLoginBtn() {
    // 【v2.7.14】按钮不再置灰，提交时强制校验
  }

  function validateCardNum() {
    const val = $('card-number').value.trim();
    const valid = /^[A-Z0-9]{13,18}$/.test(val);
    cardValidState.num = valid;
    updateFieldStatus($('card-number'), $('cardNumIcon'), $('cardNumHint'), valid, '请输入13-18位大写字母或数字');
    checkCardLoginBtn();
    if (val) hide('card-login-error');
  }

  function validateCardPwd() {
    const val = $('card-password').value;
    const valid = val.length >= 6;
    cardValidState.pwd = valid;
    updateFieldStatus($('card-password'), $('cardPwdIcon'), $('cardPwdHint'), valid, '密码至少6位');
    checkCardLoginBtn();
    if (val) hide('card-login-error');
  }

  $('card-number').addEventListener('input', validateCardNum);
  $('card-number').addEventListener('blur', validateCardNum);
  $('card-password').addEventListener('input', validateCardPwd);
  $('card-password').addEventListener('blur', validateCardPwd);

  // 【v2.7.1】协作登录实时校验
  const collabValidState = { name: false, phone: false };

  function checkCollabBtns() {
    // 【v2.7.14】按钮不再置灰，提交时强制校验
  }

  function validateCollabName() {
    const val = $('collab-name').value.trim();
    const valid = /^[\u4e00-\u9fa5a-zA-Z0-9]{2,8}$/.test(val);
    collabValidState.name = valid;
    updateFieldStatus($('collab-name'), $('collabNameIcon'), $('collabNameHint'), valid, '请输入2-8个字符，仅限中英文和数字');
    checkCollabBtns();
    if (val) hide('collab-error');
  }

  function validateCollabPhone() {
    const val = $('collab-phone').value.trim();
    const valid = /^1\d{10}$/.test(val);
    collabValidState.phone = valid;
    updateFieldStatus($('collab-phone'), $('collabPhoneIcon'), $('collabPhoneHint'), valid, '请输入正确的11位手机号');
    checkCollabBtns();
    if (val) hide('collab-error');
  }

  $('collab-name').addEventListener('input', validateCollabName);
  $('collab-name').addEventListener('blur', validateCollabName);
  $('collab-phone').addEventListener('input', validateCollabPhone);
  $('collab-phone').addEventListener('blur', validateCollabPhone);

  $('card-password').addEventListener('keydown',e=>{if(e.key==='Enter')$('btn-card-login').click();});
  $('reg-password').addEventListener('keydown',e=>{if(e.key==='Enter')$('reg-password-confirm').focus();});
  $('reg-password-confirm').addEventListener('keydown',e=>{if(e.key==='Enter')$('btn-card-register').click();});

  // 【键盘适配】动态调整 padding-bottom，防止输入框被键盘遮挡
  let originalPaddingBottom = 0;
  function handleKeyboard() {
    const windowHeight = window.innerHeight;
    const activeEl = document.activeElement;
    if (!activeEl || activeEl.tagName !== 'INPUT') {
      document.body.style.paddingBottom = originalPaddingBottom + 'px';
      return;
    }
    const rect = activeEl.getBoundingClientRect();
    const inputBottom = rect.bottom;
    const targetBottom = windowHeight - 20; // 输入框底部距屏幕底部至少 20px
    const offset = inputBottom - targetBottom;
    if (offset > 0) {
      document.body.style.paddingBottom = (originalPaddingBottom + offset) + 'px';
      activeEl.scrollIntoView({ behavior: 'auto', block: 'center' });
    } else {
      document.body.style.paddingBottom = originalPaddingBottom + 'px';
    }
  }
  window.addEventListener('load', () => {
    originalPaddingBottom = parseInt(getComputedStyle(document.body).paddingBottom) || 20;
  });
  document.querySelectorAll('.login-card input').forEach(input => {
    input.addEventListener('focus', () => { setTimeout(handleKeyboard, 200); });
    input.addEventListener('blur', () => { setTimeout(handleKeyboard, 200); });
  });
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(handleKeyboard, 100);
  });
})();
</script>
</body>
</html>
